name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate plugin manifest
        run: |
          python3 -c "
          import json
          m = json.load(open('.claude-plugin/manifest.json'))
          assert 'name' in m
          assert 'skills' in m and len(m['skills']) > 0
          print('Manifest OK:', m['name'], 'v' + m.get('version','?'))
          "

      - name: Validate skill files exist
        run: |
          python3 -c "
          import json, sys
          m = json.load(open('.claude-plugin/manifest.json'))
          missing = [s['path'] for s in m['skills'] if not __import__('pathlib').Path('.claude-plugin/' + s['path']).exists()]
          if missing: sys.exit('Missing skills: ' + str(missing))
          print('All skill files present')
          "

      - name: Import check
        run: python3 -c "import email_manager; print('import OK')"

      - name: Validate build script
        run: bash -n build.sh && echo "build.sh syntax OK"
