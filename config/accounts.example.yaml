# 邮件账户配置示例，复制为 accounts.yaml 并填写真实信息
# Gmail 需要开启"两步验证"并生成"应用专用密码"
# Outlook 同样建议使用应用专用密码

accounts:
  - name: gmail_personal
    type: gmail
    email: your@gmail.com
    password: "your-app-specific-password"  # Gmail 应用专用密码（16位）
    imap_host: imap.gmail.com
    imap_port: 993
    use_ssl: true

  - name: outlook_work
    type: outlook
    email: your@outlook.com
    password: "your-app-specific-password"
    imap_host: outlook.office365.com
    imap_port: 993
    use_ssl: true

# 本地存储根目录
storage:
  base_dir: ~/EmailArchive
  financial_dir: financial          # 银行/股票/财务
  registrations_dir: registrations  # 注册类邮件
  business_trips_dir: business_trips # 出差报销

# 分类关键词配置
